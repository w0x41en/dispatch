{{define "dashboard.html"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dispatch — Dashboard</title>
<style>
  :root { --bg:#f5f6f8; --card:#ffffff; --line:#e3e6ea; --text:#1f2328;
          --muted:#6b7280; --accent:#2f6feb; --danger:#d23f3f;
          --ok:#1f9d55; --warn:#b7791f; --tag:#eef2f7; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
         font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  header { background:var(--card); border-bottom:1px solid var(--line);
           padding:14px 24px; display:flex; align-items:center; justify-content:space-between; }
  header h1 { margin:0; font-size:17px; }
  header form { margin:0; }
  .wrap { max-width:1100px; margin:24px auto; padding:0 24px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px;
          box-shadow:0 4px 16px rgba(0,0,0,.04); }
  .drop { padding:28px; border:2px dashed var(--line); border-radius:12px;
          text-align:center; color:var(--muted); cursor:pointer; transition:.15s; }
  .drop:hover, .drop.drag { border-color:var(--accent); background:#fafbff; color:var(--text); }
  .drop strong { color:var(--accent); }
  .upload-row { display:flex; gap:12px; align-items:flex-end; margin-top:16px; flex-wrap:wrap; }
  .upload-row .exp { display:flex; flex-direction:column; gap:4px; font-size:12px; color:var(--muted); }
  select, input[type=text], input[type=number] { padding:9px 10px; border:1px solid var(--line);
          border-radius:8px; background:#fff; color:var(--text); font-size:13px; }
  table { width:100%; border-collapse:collapse; margin-top:20px; }
  th, td { text-align:left; padding:11px 12px; border-bottom:1px solid var(--line);
           font-size:13px; vertical-align:middle; }
  th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
  tr:last-child td { border-bottom:0; }
  tr.exp td { background:#fff5f5; }
  .name { font-weight:600; }
  .mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; color:var(--muted); }
  .tag { display:inline-block; padding:2px 8px; border-radius:999px; background:var(--tag);
         font-size:11px; color:var(--muted); }
  .tag.exp { background:#fde8e8; color:var(--danger); }
  .tag.never { background:#eef6ef; color:var(--ok); }
  .btn { padding:6px 10px; border:1px solid var(--line); border-radius:7px; background:#fff;
         cursor:pointer; font-size:12px; color:var(--text); }
  .btn:hover { background:#f0f2f5; }
  .btn.danger { color:var(--danger); }
  .actions { display:flex; gap:6px; align-items:center; }
  .logout { padding:7px 12px; border:1px solid var(--line); border-radius:7px; background:#fff;
            color:var(--text); font-size:13px; cursor:pointer; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
           background:#1f2328; color:#fff; padding:10px 18px; border-radius:8px;
           font-size:13px; opacity:0; transition:.2s; pointer-events:none; }
  .toast.show { opacity:1; }
  .empty { text-align:center; padding:40px; color:var(--muted); }
</style>
</head>
<body>
<header>
  <h1>Dispatch</h1>
  <form method="POST" action="/{{.AdminSecret}}/logout">
    <button class="logout" type="submit">Sign out</button>
  </form>
</header>
<div class="wrap">
  <div class="card" style="padding:20px;">
    <div class="drop" id="drop">
      Drag &amp; drop a file here, or <strong>click to choose</strong>
      <input type="file" id="file" hidden>
    </div>
    <div class="upload-row">
      <div class="exp">
        Expiry
        <select id="exp">
          <option value="0">Never</option>
          <option value="3600">1 hour</option>
          <option value="86400">24 hours</option>
          <option value="604800">7 days</option>
          <option value="2592000">30 days</option>
        </select>
      </div>
      <div class="exp">
        Max downloads
        <input type="number" id="maxdl" min="0" placeholder="∞ unlimited" style="width:150px">
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:20px;">
    <table>
      <thead>
        <tr><th>File</th><th>Size</th><th>Type</th><th>Downloads</th>
            <th>Uploaded</th><th>Expires</th><th style="text-align:right">Actions</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty">No files yet.</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SECRET = {{.AdminSecret}};
const api = (p) => `/${SECRET}${p}`;

const $ = (id) => document.getElementById(id);
const drop = $("drop"), fileInput = $("file"), expSel = $("exp"), maxdlInput = $("maxdl");
let uploadExp = "0";

// Upload expiry select mirrors the per-row select.
expSel.addEventListener("change", () => { uploadExp = expSel.value; });

drop.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => { if (fileInput.files[0]) upload(fileInput.files[0]); });
["dragenter","dragover"].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add("drag"); }));
["dragleave","drop"].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.remove("drag"); }));
drop.addEventListener("drop", ev => { if (ev.dataTransfer.files[0]) upload(ev.dataTransfer.files[0]); });

async function upload(file) {
  const fd = new FormData();
  fd.append("file", file);
  fd.append("expires_in", uploadExp);
  const md = (maxdlInput.value || "").trim();
  if (md) fd.append("max_downloads", md);
  drop.textContent = "Uploading " + file.name + "…";
  try {
    const r = await fetch(api("/api/upload"), { method:"POST", body:fd });
    if (!r.ok) { toast(await r.text()); return; }
    const f = await r.json();
    await refresh();
    toast("Uploaded — URL copied to clipboard");
    copyURL(f.uuid);
  } catch (e) { toast("Upload failed"); } finally {
    drop.innerHTML = 'Drag &amp; drop a file here, or <strong>click to choose</strong>';
    fileInput.value = "";
  }
}

async function refresh() {
  const r = await fetch(api("/api/files"));
  const data = await r.json();
  const tbody = $("rows");
  tbody.innerHTML = "";
  $("empty").style.display = data.files.length ? "none" : "block";
  for (const f of data.files) tbody.appendChild(row(f));
}

function row(f) {
  const tr = document.createElement("tr");
  if (isExpired(f.expires_at) || f.remaining === 0) tr.classList.add("exp");
  tr.innerHTML = `
    <td><div class="name">${esc(f.filename)}</div><div class="mono">${f.uuid}</div></td>
    <td>${humanSize(f.size)}</td>
    <td><span class="tag">${esc(f.content_type || "—")}</span></td>
    <td>${downloadsCell(f)}</td>
    <td>${humanTime(f.created_at)}</td>
    <td>${expiryTag(f.expires_at)}</td>
    <td><div class="actions" style="justify-content:flex-end">
      <button class="btn" data-act="copy">Copy URL</button>
      <select class="btn" data-act="exp">
        <option value="">Expiry…</option>
        <option value="0">Never</option>
        <option value="3600">1h</option>
        <option value="86400">24h</option>
        <option value="604800">7d</option>
        <option value="2592000">30d</option>
      </select>
      <select class="btn" data-act="max">
        <option value="">Lim…</option>
        <option value="0">∞</option>
        <option value="1">1</option>
        <option value="3">3</option>
        <option value="5">5</option>
        <option value="10">10</option>
      </select>
      <button class="btn danger" data-act="del">Delete</button>
    </div></td>`;
  tr.querySelector('[data-act="copy"]').onclick = () => copyURL(f.uuid);
  tr.querySelector('[data-act="del"]').onclick = async () => {
    if (!confirm("Delete " + f.filename + "?")) return;
    const r = await fetch(api("/api/files/" + f.uuid + "/delete"), { method:"POST" });
    if (r.ok) { refresh(); toast("Deleted"); }
  };
  tr.querySelector('[data-act="exp"]').onchange = async (e) => {
    const v = parseInt(e.target.value, 10);
    if (isNaN(v)) return;
    const r = await fetch(api("/api/files/" + f.uuid + "/expiry"), {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ expires_in: v })
    });
    if (r.ok) { refresh(); toast(v === 0 ? "Expiry cleared" : "Expiry updated"); }
  };
  tr.querySelector('[data-act="max"]').onchange = async (e) => {
    const v = parseInt(e.target.value, 10);
    if (isNaN(v)) return;
    const r = await fetch(api("/api/files/" + f.uuid + "/max-downloads"), {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ max_downloads: v })
    });
    if (r.ok) { refresh(); toast(v === 0 ? "Limit cleared" : "Limit updated"); }
  };
  return tr;
}

function downloadsCell(f) {
  if (f.max_downloads == null) return `${f.download_count}`;
  const rem = f.remaining;
  const cls = rem === 0 ? "tag exp" : "tag";
  const label = rem === 0 ? "exhausted" : rem + " left";
  return `${f.download_count}<span class="mono">/${f.max_downloads}</span> <span class="${cls}">${label}</span>`;
}

function copyURL(uuid) {
  const url = location.origin + "/" + uuid;
  navigator.clipboard.writeText(url).then(() => toast("Copied: " + url), () => toast(url));
}

// --- helpers ---
function isExpired(ea) { return ea != null && (Date.now()/1000) >= ea; }
function expiryTag(ea) {
  if (ea == null) return '<span class="tag never">Never</span>';
  const diff = ea - Date.now()/1000;
  if (diff <= 0) return '<span class="tag exp">Expired</span>';
  return '<span class="tag">' + humanDur(diff) + '</span>';
}
function humanDur(s) {
  if (s < 3600) return Math.round(s/60) + " min";
  if (s < 86400) return Math.round(s/3600) + " h";
  return Math.round(s/86400) + " d";
}
function humanSize(n) {
  const u = ["B","KB","MB","GB"];
  let i = 0; while (n >= 1024 && i < u.length-1) { n/=1024; i++; }
  return n.toFixed(i?1:0) + " " + u[i];
}
function humanTime(unix) {
  const d = new Date(unix*1000);
  return d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}
function esc(s) { const t = document.createElement("span"); t.textContent = s; return t.innerHTML; }
let toastT;
function toast(msg) {
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove("show"), 2600);
}

refresh();
</script>
</body>
</html>{{end}}
