{{define "login.html"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dispatch</title>
<style>
  :root { --bg:#f5f6f8; --card:#ffffff; --line:#e3e6ea; --text:#1f2328;
          --muted:#6b7280; --accent:#2f6feb; --err:#d23f3f; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
         font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .card { background:var(--card); border:1px solid var(--line);
          border-radius:14px; box-shadow:0 8px 30px rgba(0,0,0,.06);
          padding:32px; width:340px; }
  h1 { margin:0 0 4px; font-size:20px; }
  p.sub { margin:0 0 20px; color:var(--muted); font-size:13px; }
  label { display:block; margin-bottom:14px; font-size:13px; color:var(--muted); }
  input { display:block; width:100%; margin-top:6px; padding:10px 12px;
          border:1px solid var(--line); border-radius:8px; font-size:14px;
          background:#fff; color:var(--text); }
  input:focus { outline:none; border-color:var(--accent);
                box-shadow:0 0 0 3px rgba(47,111,235,.15); }
  button { width:100%; padding:11px; border:0; border-radius:8px;
           background:var(--accent); color:#fff; font-size:14px; font-weight:600;
           cursor:pointer; }
  button:hover { background:#2556c7; }
  .err { color:var(--err); margin:12px 0 0; font-size:13px; }
</style>
</head>
<body>
  <div class="card">
    <h1>Dispatch</h1>
    <p class="sub">File distribution</p>
    <form method="POST" action="/{{.AdminSecret}}/login" autocomplete="off">
      <label>Password
        <input type="password" name="password" autofocus required>
      </label>
      <button type="submit">Sign in</button>
      {{if .Error}}<p class="err">Invalid password. Try again.</p>{{end}}
    </form>
  </div>
</body>
</html>{{end}}
